name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: jall_technologies_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/jall_technologies_test
      AUTH_SECRET: ci-only-placeholder-secret-not-for-production-use
      NEXT_PUBLIC_SITE_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Run unit tests
        run: npm run test

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Build
        run: npm run build

  # Deployment itself is handled by Vercel's GitHub integration (auto-deploys
  # on push to main once the repo is connected). This workflow exists as the
  # quality gate that has to pass first — wire it as a required check on the
  # `main` branch in GitHub's branch protection settings.
